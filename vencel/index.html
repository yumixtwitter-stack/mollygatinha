<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>quer casar comigo? 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #ffe9f0 0%, #ffe0f0 100%);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: pan-x pan-y;
      transition: background 0.8s ease;
    }

    .card {
      position: absolute;
      width: min(420px, 86vw);
      max-width: 460px;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      padding: 2rem 1.8rem 2.2rem;
      text-align: center;
      box-shadow: 0 30px 50px rgba(255, 43, 133, 0.2), 0 10px 25px rgba(0, 0, 0, 0.05);
      transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1), top 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 30;
      border: 1px solid rgba(255, 122, 179, 0.3);
      box-sizing: border-box;
      will-change: left, top;
    }

    .card::before {
      content: "✨";
      position: absolute;
      top: -20px;
      left: 20px;
      font-size: 28px;
      opacity: 0.7;
      pointer-events: none;
    }

    .card::after {
      content: "✨";
      position: absolute;
      bottom: -22px;
      right: 20px;
      font-size: 28px;
      opacity: 0.7;
      pointer-events: none;
      transform: rotate(15deg);
    }

    .ring-icon {
      font-size: 68px;
      display: inline-block;
      margin-bottom: 12px;
      filter: drop-shadow(0 6px 12px rgba(255, 43, 133, 0.3));
      animation: floatRing 2.4s ease-in-out infinite;
    }

    @keyframes floatRing {
      0% { transform: translateY(0px) rotate(-5deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(-5deg); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(26px, 7vw, 34px);
      font-weight: 800;
      background: linear-gradient(135deg, #ff2b85, #ff659e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .lead {
      color: #b86b92;
      font-size: clamp(13px, 4vw, 15px);
      font-weight: 600;
      background: #fff0f0;
      display: inline-block;
      padding: 4px 16px;
      border-radius: 40px;
      margin-bottom: 28px;
      backdrop-filter: blur(4px);
    }

    .buttons {
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn-yes {
      padding: 14px 32px;
      border-radius: 60px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      background: linear-gradient(100deg, #ff3b8c, #ff1f78);
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 12px 20px rgba(255, 43, 133, 0.4);
      letter-spacing: 1px;
      animation: softPulse 2s infinite;
    }

    @keyframes softPulse {
      0% { transform: scale(1); box-shadow: 0 12px 20px rgba(255, 43, 133, 0.4); }
      50% { transform: scale(1.04); box-shadow: 0 18px 28px rgba(255, 43, 133, 0.6); }
      100% { transform: scale(1); box-shadow: 0 12px 20px rgba(255, 43, 133, 0.4); }
    }

    .btn-yes:active {
      transform: scale(0.96);
    }

    .btn-no {
      padding: 14px 28px;
      border-radius: 60px;
      border: 2px solid #ffcfb0;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      background: #fff0e0;
      color: #c25d2e;
      cursor: pointer;
      transition: 0.1s linear;
      backdrop-filter: blur(2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.02);
    }

    .btn-no:active {
      background: #ffe2cb;
      transform: scale(0.97);
    }

    .heart {
      position: absolute;
      pointer-events: none;
      font-size: 22px;
      bottom: -30px;
      z-index: 25;
      animation: floatHeart 3.8s ease-out forwards;
      filter: drop-shadow(0 0 3px rgba(255,90,140,0.5));
    }

    @keyframes floatHeart {
      0% {
        transform: translateY(0) scale(0.5) rotate(0deg);
        opacity: 0.9;
      }
      70% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-110vh) scale(1.2) rotate(25deg);
        opacity: 0;
      }
    }

    .success-box {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: min(380px, 84vw);
      background: white;
      border-radius: 48px;
      padding: 28px 20px 32px;
      box-shadow: 0 30px 45px rgba(255, 70, 130, 0.2);
      border: 1px solid rgba(255, 122, 179, 0.3);
      z-index: 50;
      animation: bounceGlow 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    @keyframes bounceGlow {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.7);
      }
      80% {
        transform: translate(-50%, -50%) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .snoopy-emoji {
      font-size: 90px;
      display: inline-block;
      animation: danceParty 0.5s infinite alternate ease;
      filter: drop-shadow(0 6px 12px #ffb7c7);
      margin-bottom: 8px;
    }

    @keyframes danceParty {
      from { transform: rotate(-8deg) scale(0.98); }
      to { transform: rotate(8deg) scale(1.12); }
    }

    .snoopy-img {
      width: 160px;
      max-width: 65%;
      border-radius: 0;
      margin: 0 auto 16px;
      display: block;
      background: transparent;
      padding: 0;
      box-shadow: none;
      object-fit: contain;
    }

    .success-msg {
      font-family: 'Playfair Display', serif;
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 800;
      color: #ff3377;
      background: rgba(255, 248, 245, 0.9);
      padding: 14px 20px;
      border-radius: 50px;
      backdrop-filter: blur(8px);
      margin-top: 12px;
      letter-spacing: -0.2px;
      line-height: 1.3;
    }

    .footer-note {
      position: fixed;
      bottom: 12px;
      right: 14px;
      font-size: 11px;
      font-weight: 600;
      color: #d47c9e;
      background: rgba(255, 245, 245, 0.7);
      backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 40px;
      z-index: 40;
      font-family: monospace;
      pointer-events: none;
    }

    .music-control {
      position: fixed;
      bottom: 12px;
      left: 14px;
      background: rgba(255, 245, 245, 0.9);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 12px;
      color: #d47c9e;
      font-family: monospace;
      z-index: 40;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 122, 179, 0.3);
      font-weight: 600;
    }

    .music-control:hover {
      background: rgba(255, 245, 245, 1);
      transform: scale(1.02);
    }

    .music-control span:first-child {
      font-size: 16px;
    }

    @media (max-width: 550px) {
      .card {
        width: 86vw;
        padding: 1.6rem 1.2rem 1.9rem;
      }
      .btn-yes, .btn-no {
        padding: 12px 20px;
        font-size: 1rem;
      }
      .buttons {
        gap: 12px;
      }
      .ring-icon {
        font-size: 54px;
      }
      .success-box {
        width: 86vw;
        padding: 22px 16px 28px;
      }
      .snoopy-img {
        width: 130px;
      }
      .music-control {
        bottom: 12px;
        left: 12px;
        font-size: 10px;
        padding: 5px 12px;
      }
    }

    @media (max-width: 380px) {
      .card {
        width: 92vw;
        padding: 1.4rem 1rem 1.7rem;
      }
      .btn-yes, .btn-no {
        padding: 10px 20px;
      }
      .success-box {
        width: 90vw;
      }
    }
  </style>
</head>
<body>
<div class="stage" id="stage">
  <div class="card" id="card">
    <span class="ring-icon">💍💖</span>
    <h1>quer casar comigo?</h1>
    <p class="lead">hein hein hein </p>
    <div class="buttons">
      <button class="btn-yes" id="btnYes">SIM, VAMO 💍</button>
      <button class="btn-no" id="btnNo">NÃO 💔</button>
    </div>
  </div>

  <div class="success-box" id="successBox">
    <span class="snoopy-emoji" id="snoopyEmoji">🐶💕</span>
    <div class="success-msg">boa escolha :D <br> eu te amo amor 𖹭.ᐟ</div>
  </div>
</div>

<div class="music-control" id="musicControl" style="display: none;">
  <span>🎵</span>
  <span id="musicStatus">Música tocando...</span>
</div>

<div class="footer-note">feito pra minha gatinha 🐈‍⬛✨</div>

<script>
  (function() {
    const stage = document.getElementById('stage');
    const card = document.getElementById('card');
    const btnNo = document.getElementById('btnNo');
    const btnYes = document.getElementById('btnYes');
    const successBox = document.getElementById('successBox');
    const snoopyEmojiSpan = document.getElementById('snoopyEmoji');
    const musicControl = document.getElementById('musicControl');
    const musicStatus = document.getElementById('musicStatus');

    // ========== MÚSICA LOCAL ==========
    let audio = null;
    let isMusicPlaying = false;
    let musicAttempts = 0;

    // Função para carregar a música com o nome exato que você tem
    function setupMusic() {
      // Nome do arquivo exato como você tem: "é você - tribalistas.mp3"
      // Vamos usar encodeURIComponent para lidar com acentos e espaços
      const fileName = "é você - tribalistas.mp3";
      const encodedFileName = encodeURIComponent(fileName);
      
      // Tenta carregar o áudio
      audio = new Audio();
      audio.src = encodedFileName;
      audio.loop = true;
      audio.volume = 0.7;
      audio.preload = "auto";
      
      // Verifica se o arquivo existe e pode ser carregado
      audio.addEventListener('canplaythrough', () => {
        console.log('✅ Música carregada com sucesso!');
        if (musicStatus) {
          musicStatus.textContent = '🎵 É Você - Tribalistas tocando...';
        }
      });
      
      audio.addEventListener('error', (e) => {
        console.error('❌ Erro ao carregar música:', e);
        musicControl.style.display = 'flex';
        musicStatus.innerHTML = '⚠️ Clique para tocar a música';
        musicControl.style.cursor = 'pointer';
        
        // Tenta novamente com nome sem acento (fallback)
        if (musicAttempts === 0) {
          musicAttempts++;
          const fallbackName = "e voce - tribalistas.mp3";
          audio = new Audio();
          audio.src = fallbackName;
          audio.loop = true;
          audio.volume = 0.7;
          
          audio.addEventListener('canplaythrough', () => {
            console.log('✅ Música carregada com fallback!');
            musicStatus.textContent = '🎵 É Você - Tribalistas tocando...';
          });
          
          audio.addEventListener('error', () => {
            console.error('❌ Arquivo de música não encontrado!');
            musicStatus.innerHTML = '📁 Coloque "é você - tribalistas.mp3" na mesma pasta';
          });
        } else {
          musicStatus.innerHTML = '📁 Coloque "é você - tribalistas.mp3" na mesma pasta';
        }
      });
    }
    
    function playMusic() {
      if (audio && !isMusicPlaying) {
        audio.play().then(() => {
          isMusicPlaying = true;
          musicControl.style.display = 'flex';
          musicStatus.textContent = '🎵 É Você - Tribalistas tocando...';
          musicControl.style.cursor = 'default';
        }).catch(err => {
          console.log('Autoplay bloqueado pelo navegador:', err);
          musicControl.style.display = 'flex';
          musicStatus.innerHTML = '🔊 Clique para tocar a música';
          musicControl.style.cursor = 'pointer';
          
          // Configura clique para tocar
          musicControl.onclick = () => {
            if (audio && !isMusicPlaying) {
              audio.play().then(() => {
                isMusicPlaying = true;
                musicStatus.textContent = '🎵 É Você - Tribalistas tocando...';
                musicControl.style.cursor = 'default';
                musicControl.onclick = null;
              }).catch(e => console.log('Erro ao tocar:', e));
            }
          };
        });
      } else if (!audio) {
        setupMusic();
        setTimeout(() => playMusic(), 200);
      }
    }

    // Inicializa a música
    setupMusic();

    // ========== POSICIONAMENTO DO CARD ==========
    function enforceCardBounds() {
      if (!card || !stage || card.style.display === 'none') return;
      const stageRect = stage.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      let left = parseFloat(card.style.left);
      let top = parseFloat(card.style.top);
      if (isNaN(left)) left = cardRect.left;
      if (isNaN(top)) top = cardRect.top;

      const minLeft = 8;
      const maxLeft = stageRect.width - cardRect.width - 8;
      const minTop = 12;
      const maxTop = stageRect.height - cardRect.height - 12;

      let newLeft = left;
      let newTop = top;
      if (newLeft < minLeft) newLeft = minLeft;
      if (newLeft > maxLeft) newLeft = maxLeft;
      if (newTop < minTop) newTop = minTop;
      if (newTop > maxTop) newTop = maxTop;

      if (newLeft !== left) card.style.left = newLeft + 'px';
      if (newTop !== top) card.style.top = newTop + 'px';
    }

    function centerCard() {
      if (!card || !stage) return;
      const stageRect = stage.getBoundingClientRect();
      const cardW = card.offsetWidth;
      const cardH = card.offsetHeight;
      let left = (stageRect.width - cardW) / 2;
      let top = (stageRect.height - cardH) / 2;
      left = Math.max(10, Math.min(stageRect.width - cardW - 10, left));
      top = Math.max(12, Math.min(stageRect.height - cardH - 12, top));
      card.style.left = left + 'px';
      card.style.top = top + 'px';
    }

    function getRandomSafeCorner() {
      if (!stage || !card) return { x: 20, y: 20 };
      const stageRect = stage.getBoundingClientRect();
      const cardW = card.offsetWidth;
      const cardH = card.offsetHeight;
      const margin = 12;
      const maxX = Math.max(margin, stageRect.width - cardW - margin);
      const maxY = Math.max(margin, stageRect.height - cardH - margin);
      const minX = margin;
      const minY = margin;

      const candidates = [
        { x: minX, y: minY }, { x: maxX, y: minY },
        { x: minX, y: maxY }, { x: maxX, y: maxY },
        { x: (minX + maxX) / 2, y: minY }, { x: (minX + maxX) / 2, y: maxY },
        { x: minX, y: (minY + maxY) / 2 }, { x: maxX, y: (minY + maxY) / 2 },
        { x: Math.random() * (maxX - minX) + minX, y: Math.random() * (maxY - minY) + minY }
      ];
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function moveCardToSafeSpot() {
      if (!card || !stage || card.style.display === 'none') return;
      const safePos = getRandomSafeCorner();
      card.style.left = safePos.x + 'px';
      card.style.top = safePos.y + 'px';
      setTimeout(() => enforceCardBounds(), 20);
    }

    btnNo.addEventListener('mouseenter', (e) => { e.preventDefault(); moveCardToSafeSpot(); });
    btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); moveCardToSafeSpot(); });
    btnNo.addEventListener('click', (e) => { e.preventDefault(); moveCardToSafeSpot(); });

    window.addEventListener('resize', () => { setTimeout(() => { if (card.style.display !== 'none') centerCard(); enforceCardBounds(); }, 40); });
    window.addEventListener('orientationchange', () => { setTimeout(() => { if (card.style.display !== 'none') centerCard(); enforceCardBounds(); }, 80); });

    // ========== CORAÇÕES INFINITOS ==========
    const heartSymbols = ['❤️', '💖', '💘', '💝', '💗', '💓', '💐', '✨', '💞', '💕', '💐',];

    function spawnHearts(count = 12) {
      for (let i = 0; i < count; i++) {
        const heartDiv = document.createElement('div');
        heartDiv.className = 'heart';
        heartDiv.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
        heartDiv.style.left = (Math.random() * 90 + 2) + '%';
        heartDiv.style.bottom = '-40px';
        heartDiv.style.fontSize = (Math.floor(Math.random() * 20 + 16)) + 'px';
        heartDiv.style.animationDuration = (2.5 + Math.random() * 2) + 's';
        heartDiv.style.opacity = 0.7 + Math.random() * 0.5;
        stage.appendChild(heartDiv);
        setTimeout(() => { if (heartDiv && heartDiv.remove) heartDiv.remove(); }, 3800);
      }
    }

    let heartsInterval = null;
    function startInfiniteHearts() {
      if (heartsInterval) clearInterval(heartsInterval);
      spawnHearts(45);
      heartsInterval = setInterval(() => spawnHearts(12), 850);
    }

    // ========== SNOOPY GIF ==========
    function loadSnoopyGif() {
      const existingImg = successBox.querySelector('.snoopy-img');
      if (existingImg) existingImg.remove();
      if (snoopyEmojiSpan) snoopyEmojiSpan.style.display = 'none';

      const img = document.createElement('img');
      img.className = 'snoopy-img';
      img.alt = 'snoopy dancing forever';
      img.src = 'https://i.ibb.co/b5z8YqLw/Imagens-De-Abra-os.gif';
      
      img.style.backgroundColor = 'transparent';
      img.style.padding = '0';
      img.style.borderRadius = '0';
      img.style.boxShadow = 'none';
      
      img.onerror = () => {
        if (snoopyEmojiSpan) snoopyEmojiSpan.style.display = 'inline-block';
        if (img && img.parentNode) img.remove();
      };
      
      successBox.insertBefore(img, successBox.firstChild);
    }

    // ========== BOTÃO SIM ==========
    btnYes.addEventListener('click', (e) => {
      e.preventDefault();
      if (card.style.display === 'none') return;
      card.style.display = 'none';
      successBox.style.display = 'block';
      loadSnoopyGif();
      startInfiniteHearts();
      playMusic(); // Toca a música!
      
      stage.style.background = 'radial-gradient(circle at 30% 20%, #ffd9e8, #ffc0dd)';
      document.body.style.background = 'radial-gradient(circle at 30% 20%, #ffd9e8, #ffb8d4)';
    });

    function initialSetup() {
      centerCard();
      enforceCardBounds();
      setInterval(() => { if (card && card.style.display !== 'none') enforceCardBounds(); }, 450);
    }

    const observer = new MutationObserver(() => { if (card && card.style.display !== 'none') enforceCardBounds(); });
    observer.observe(card, { attributes: true, attributeFilter: ['style'] });

    initialSetup();
    window.addEventListener('load', () => { centerCard(); enforceCardBounds(); });
  })();
</script>
</body>
  </html>
